  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F5F7FA; }
    #root { min-height: 100vh; }
    ::selection { background: #D6E4FF; color: #4B7BF7; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E2E5EA; border-radius: 3px; }
    input:focus, select:focus, textarea:focus { border-color: #4B7BF7 !important; box-shadow: 0 0 0 3px #EBF3FF !important; outline: none; }
    tr:hover td { background: #F8F9FB; }
    button:hover { filter: brightness(0.95); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

// --- Reusable Components ---
const Badge = ({ children, color, bg, dot }) => (
  <span style={{
    display: "inline-flex", alignItems: "center", gap: 5,
    padding: "3px 10px", borderRadius: T.rFull,
    fontSize: 11, fontWeight: 600, fontFamily: T.fontB,
    color, background: bg, letterSpacing: "0.01em", whiteSpace: "nowrap",
  }}>
    {dot && <span style={{ width: 6, height: 6, borderRadius: "50%", background: color }} />}
    {children}
  </span>
);

const Btn = ({ children, v = "primary", size = "md", onClick, style: s }) => {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6,
    borderRadius: T.r, fontFamily: T.fontB, cursor: "pointer",
    border: "none", transition: "all 0.15s", fontWeight: 600, letterSpacing: "0.01em",
    padding: size === "sm" ? "6px 12px" : size === "lg" ? "12px 24px" : "8px 18px",
    fontSize: size === "sm" ? 12 : size === "lg" ? 15 : 13,
  };
  const variants = {
    primary: { ...base, background: T.primary, color: "#fff" },
    secondary: { ...base, background: T.surface, color: T.ink, border: `1px solid ${T.border}`, boxShadow: T.sh },
    ghost: { ...base, background: "transparent", color: T.inkSoft, padding: size === "sm" ? "4px 8px" : "6px 12px" },
    danger: { ...base, background: T.dangerSoft, color: T.danger },
    success: { ...base, background: T.successSoft, color: T.success },
  };
  return <button style={{ ...variants[v], ...s }} onClick={onClick}>{children}</button>;
};

const Ico = ({ d, size = 18, color = "currentColor" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color} style={{ flexShrink: 0 }}><path d={d} /></svg>
);

const Avatar = ({ name, size = 36, colors }) => {
  const initials = name.split(" ").map(w => w[0]).join("").slice(-2).toUpperCase();
  const c = colors || [`${T.primary}30`, T.primary];
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%", flexShrink: 0,
      background: `linear-gradient(135deg, ${c[0]}, ${c[1]})`,
      display: "flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontSize: size * 0.35, fontWeight: 700, fontFamily: T.fontD,
    }}>{initials}</div>
  );
};

const Input = ({ label, ...props }) => (
  <div>
    {label && <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.inkSoft, marginBottom: 5, fontFamily: T.fontB }}>{label}</label>}
    <input {...props} style={{
      width: "100%", padding: "9px 12px", borderRadius: T.rSm, border: `1px solid ${T.border}`,
      fontSize: 13, fontFamily: T.fontB, color: T.ink, background: T.surface, outline: "none",
      transition: "border-color 0.15s, box-shadow 0.15s", boxSizing: "border-box",
      ...props.style,
    }} />
  </div>
);

const Select = ({ label, children, ...props }) => (
  <div>
    {label && <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.inkSoft, marginBottom: 5, fontFamily: T.fontB }}>{label}</label>}
    <select {...props} style={{
      width: "100%", padding: "9px 12px", borderRadius: T.rSm, border: `1px solid ${T.border}`,
      fontSize: 13, fontFamily: T.fontB, color: T.ink, background: T.surface, outline: "none",
      boxSizing: "border-box", ...props.style,
    }}>{children}</select>
  </div>
);

const Card = ({ children, style: s, onClick }) => (
  <div onClick={onClick} style={{
    background: T.surface, borderRadius: T.rLg, border: `1px solid ${T.border}`,
    padding: 20, boxShadow: T.sh, ...s,
    ...(onClick ? { cursor: "pointer", transition: "box-shadow 0.15s" } : {}),
  }}>{children}</div>
);

const Tabs = ({ items, active, onChange }) => (
  <div style={{ display: "flex", gap: 0, borderBottom: `1px solid ${T.border}`, marginBottom: 20 }}>
    {items.map(t => (
      <button key={t.id} onClick={() => onChange(t.id)} style={{
        padding: "10px 18px", fontSize: 13, fontWeight: active === t.id ? 700 : 500,
        fontFamily: T.fontB, color: active === t.id ? T.primary : T.inkMuted,
        background: "none", border: "none",
        borderBottom: active === t.id ? `2px solid ${T.primary}` : "2px solid transparent",
        marginBottom: -1, cursor: "pointer", transition: "all 0.12s",
      }}>{t.label}{t.count != null && <span style={{
        marginLeft: 6, fontSize: 10, padding: "1px 6px", borderRadius: T.rFull,
        background: active === t.id ? T.primarySoft : T.surfaceAlt,
        color: active === t.id ? T.primary : T.inkMuted, fontWeight: 700,
      }}>{t.count}</span>}</button>
    ))}
  </div>
);

const StatCard = ({ label, value, sub, icon, color, bg }) => (
  <Card style={{ display: "flex", gap: 14, alignItems: "flex-start", flex: "1 1 180px", minWidth: 180 }}>
    <div style={{
      width: 40, height: 40, borderRadius: T.r, background: bg || T.primarySoft,
      display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
    }}>
      <Ico d={icon || IC.kpi} size={20} color={color || T.primary} />
    </div>
    <div>
      <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: T.fontB, fontWeight: 600, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 800, fontFamily: T.fontD, color: T.ink, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: T.inkSoft, marginTop: 4, fontWeight: 500 }}>{sub}</div>}
    </div>
  </Card>
);

const Modal = ({ title, onClose, children, width = 560 }) => (
  <div style={{
    position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex",
    alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(4px)",
  }} onClick={onClose}>
    <div style={{
      background: T.surface, borderRadius: T.rXl, width, maxHeight: "88vh", overflow: "auto",
      boxShadow: T.shLg,
    }} onClick={e => e.stopPropagation()}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "20px 24px", borderBottom: `1px solid ${T.borderLight}`, position: "sticky", top: 0,
        background: T.surface, zIndex: 1, borderRadius: `${T.rXl} ${T.rXl} 0 0`,
      }}>
        <h2 style={{ fontFamily: T.fontD, fontSize: 18, fontWeight: 700, margin: 0, color: T.ink }}>{title}</h2>
        <button onClick={onClose} style={{ background: T.surfaceAlt, border: "none", cursor: "pointer", padding: 6, borderRadius: T.rSm, display: "flex" }}>
          <Ico d={IC.close} size={16} color={T.inkMuted} />
        </button>
      </div>
      <div style={{ padding: "20px 24px" }}>{children}</div>
    </div>
  </div>
);

const TH = ({ children }) => (
  <th style={{
    textAlign: "left", padding: "8px 12px", fontSize: 11, fontWeight: 700,
    color: T.inkMuted, borderBottom: `1px solid ${T.border}`,
    textTransform: "uppercase", letterSpacing: "0.05em", fontFamily: T.fontB, whiteSpace: "nowrap",
  }}>{children}</th>
);

const TD = ({ children, style: s, mono }) => (
  <td style={{
    padding: "10px 12px", borderBottom: `1px solid ${T.borderLight}`,
    fontSize: 13, color: T.inkSoft, fontFamily: mono ? T.fontM : T.fontB,
    fontWeight: mono ? 500 : 400, ...s,
  }}>{children}</td>
);

// --- SIDEBAR ---
const Sidebar = ({ active, onNav, collapsed }) => {
  const nav = [
    { id: "dashboard", icon: IC.dash, label: "Tổng quan", section: "CHÍNH" },
    { id: "employee", icon: IC.people, label: "Nhân sự" },
    { id: "orgchart", icon: IC.org, label: "Sơ đồ tổ chức" },
    { id: "leave", icon: IC.cal, label: "Nghỉ phép", badge: 3 },
    { id: "attendance", icon: IC.clock, label: "Chấm công" },
    { id: "kpi", icon: IC.kpi, label: "KPI & Đánh giá", section: "HIỆU SUẤT" },
    { id: "skill", icon: IC.skill, label: "Năng lực" },
    { id: "training", icon: IC.train, label: "Đào tạo" },
    { id: "workflow", icon: IC.doc, label: "Yêu cầu", badge: 5, section: "VẬN HÀNH" },
    { id: "contract", icon: IC.contract, label: "Hợp đồng" },
    { id: "payroll", icon: IC.money, label: "Lương & Phúc lợi" },
    { id: "settings", icon: IC.gear, label: "Cài đặt", section: "HỆ THỐNG" },
  ];

  let lastSection = "";
  return (
    <div style={{
      width: 248, height: "100vh", background: T.surface, borderRight: `1px solid ${T.border}`,
      display: "flex", flexDirection: "column", position: "fixed", left: 0, top: 0, zIndex: 100,
      fontFamily: T.fontB,
    }}>
      <div style={{ padding: "18px 20px 14px", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          width: 32, height: 32, borderRadius: T.r,
          background: `linear-gradient(135deg, ${T.primary}, #3558B8)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontFamily: T.fontD, fontWeight: 800, fontSize: 15,
        }}>N</div>
        <div>
          <div style={{ fontFamily: T.fontD, fontWeight: 800, fontSize: 16, color: T.ink, lineHeight: 1.1 }}>Nexus</div>
          <div style={{ fontSize: 10, color: T.inkMuted, fontWeight: 600, letterSpacing: "0.06em" }}>HR PLATFORM</div>
        </div>
      </div>

      <div style={{ flex: 1, padding: "4px 8px", overflowY: "auto" }}>
        {nav.map((item, idx) => {
          const showSection = item.section && item.section !== lastSection;
          if (item.section) lastSection = item.section;
          return (
            <div key={item.id}>
              {showSection && (
                <div style={{
                  fontSize: 10, fontWeight: 700, color: T.inkMuted, padding: "12px 12px 6px",
                  letterSpacing: "0.08em", textTransform: "uppercase",
                }}>{item.section}</div>
              )}
              <div onClick={() => onNav(item.id)} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",
                borderRadius: T.rSm, cursor: "pointer", marginBottom: 1,
                background: active === item.id ? T.primarySoft : "transparent",
                color: active === item.id ? T.primary : T.inkSoft,
                fontWeight: active === item.id ? 600 : 500, fontSize: 13,
                transition: "all 0.1s",
              }}>
                <Ico d={item.icon} size={17} color={active === item.id ? T.primary : T.inkMuted} />
                <span style={{ flex: 1 }}>{item.label}</span>
                {item.badge && (
                  <span style={{
                    fontSize: 10, padding: "1px 7px", borderRadius: T.rFull, fontWeight: 700,
                    background: active === item.id ? T.primary : T.accent,
                    color: "#fff",
                  }}>{item.badge}</span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ padding: "12px", borderTop: `1px solid ${T.borderLight}` }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "8px",
          borderRadius: T.r, background: T.surfaceAlt, cursor: "pointer",
        }}>

                            onClick={() => setNewRole(r => ({ ...r, color: c }))}
                            style={{
                              width: 24, height: 24, borderRadius: "50%", background: c, cursor: "pointer",
                              border: newRole.color === c ? `3px solid ${T.ink}` : "3px solid transparent",
                              boxSizing: "border-box", transition: "border 0.15s",
                            }}
                          />
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Ma trận quyền mặc định */}
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.inkSoft, marginBottom: 8 }}>Quyền truy cập mặc định</label>
                    <div style={{ border: `1px solid ${T.border}`, borderRadius: T.r, overflow: "hidden" }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr repeat(3, 60px)", background: T.surfaceAlt, padding: "8px 12px", borderBottom: `1px solid ${T.border}` }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: T.inkMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Module</span>
                        {["Xem", "Tạo/Sửa", "Duyệt"].map(p => (
                          <span key={p} style={{ fontSize: 11, fontWeight: 700, color: T.inkMuted, textTransform: "uppercase", letterSpacing: "0.05em", textAlign: "center" }}>{p}</span>
                        ))}
                      </div>
                      {["Nhân sự", "Nghỉ phép", "Chấm công", "KPI", "Lương", "Cài đặt"].map((mod, mi) => (
                        <div key={mod} style={{ display: "grid", gridTemplateColumns: "1fr repeat(3, 60px)", padding: "9px 12px", borderBottom: mi < 5 ? `1px solid ${T.borderLight}` : "none", alignItems: "center" }}>
                          <span style={{ fontSize: 13, color: T.ink, fontWeight: 500 }}>{mod}</span>
                          {[0, 1, 2].map(pi => (
                            <div key={pi} style={{ textAlign: "center" }}>
                              <div style={{
                                width: 22, height: 22, borderRadius: 6, margin: "0 auto",
                                display: "flex", alignItems: "center", justifyContent: "center",
                                background: (pi === 0) ? T.successSoft : T.surfaceAlt,
                                color: (pi === 0) ? T.success : T.border,
                                fontSize: 12, fontWeight: 700, cursor: "pointer",
                                border: `1px solid ${(pi === 0) ? T.success + "40" : T.border}`,
                              }}>
                                {pi === 0 ? "✓" : "—"}
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize: 11, color: T.inkMuted, marginTop: 6 }}>
                      💡 Có thể chỉnh chi tiết sau khi tạo trong Ma trận quyền
                    </div>
                  </div>

                  {/* Preview */}
                  {newRole.name && (
                    <div style={{ padding: "12px 14px", borderRadius: T.r, border: `2px solid ${newRole.color}`, background: `${newRole.color}06` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: T.inkMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Xem trước</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: newRole.color }} />
                        <span style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>{newRole.name}</span>
                      </div>
                      {newRole.desc && <div style={{ fontSize: 11, color: T.inkMuted, marginBottom: 6 }}>{newRole.desc}</div>}
                      <Badge color={newRole.color} bg={`${newRole.color}15`}>0 người</Badge>
                    </div>
                  )}

                  {/* Actions */}
                  <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 4, borderTop: `1px solid ${T.borderLight}` }}>
                    <Btn v="secondary" onClick={() => setShowNewRoleModal(false)}>Hủy</Btn>
                    <Btn
                      onClick={() => {
                        if (!newRole.name.trim()) return;
                        setShowNewRoleModal(false);
                      }}
                    >
                      <Ico d={IC.check} size={14} /> Tạo vai trò
                    </Btn>
                  </div>
                </div>
              </Modal>
            )}
          </>)}

          {/* ==================== TÍCH HỢP ==================== */}
          {tab === "integration" && (<>
            <Card>
              <h3 style={{ fontFamily: T.fontD, fontSize: 16, fontWeight: 700, margin: "0 0 6px" }}>Tích hợp hệ thống</h3>
              <p style={{ fontSize: 12, color: T.inkMuted, margin: "0 0 16px" }}>Kết nối Nexus với các hệ thống hiện có</p>
              {[
                { name: "Vareal ID", desc: "Đăng nhập SSO, quản lý danh tính tập trung", connected: true, lastSync: "Realtime", icon: "🔐" },
                { name: "Google Calendar", desc: "Tự động đồng bộ lịch nghỉ phép khi duyệt", connected: true, lastSync: "13/04 14:30", icon: "📅" },
                { name: "Google Workspace", desc: "Gửi email thông báo, phiếu lương", connected: false, lastSync: null, icon: "📧" },
                { name: "Mattermost", desc: "Thông báo realtime: duyệt phép, nhắc chấm công", connected: false, lastSync: null, icon: "💬" },
                { name: "Máy chấm công", desc: "Tích hợp vân tay, Face ID, GPS check-in", connected: false, lastSync: null, icon: "🖐" },
                { name: "freee / Kế toán", desc: "Đồng bộ dữ liệu lương, bảo hiểm", connected: false, lastSync: null, icon: "💰" },
              ].map((int, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 0", borderTop: i ? `1px solid ${T.borderLight}` : "none" }}>
                  <div style={{ width: 44, height: 44, borderRadius: T.r, background: T.surfaceAlt, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{int.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>{int.name}</div>
                    <div style={{ fontSize: 12, color: T.inkMuted }}>{int.desc}</div>
                    {int.lastSync && <div style={{ fontSize: 11, color: T.success, marginTop: 2 }}>Đồng bộ lần cuối: {int.lastSync}</div>}
                  </div>
                  {int.connected ? (
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <Badge color={T.success} bg={T.successSoft} dot>Đã kết nối</Badge>
                      <Btn v="ghost" size="sm"><Ico d={IC.gear} size={14} /></Btn>
                    </div>
                  ) : <Btn v="secondary" size="sm">Kết nối</Btn>}
                </div>
              ))}
            </Card>
          </>)}

          {/* ==================== NHẬT KÝ HỆ THỐNG ==================== */}
          {tab === "audit" && (<>
            <Card style={{ padding: 0, overflow: "hidden" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderBottom: `1px solid ${T.borderLight}` }}>
                <h3 style={{ fontFamily: T.fontD, fontSize: 15, fontWeight: 700, margin: 0 }}>Nhật ký hoạt động</h3>
                <div style={{ display: "flex", gap: 8 }}>
                  <Select style={{ width: 130, fontSize: 12 }}><option>Tất cả module</option>{modules.map(m => <option key={m}>{m}</option>)}</Select>
                  <Select style={{ width: 140, fontSize: 12 }}><option>Tất cả người dùng</option><option>Trần Thị Ngọc</option><option>Đinh Trọng Hưng</option><option>Lê Ngọc Minh Thư</option><option>Bùi Thị Khánh Huyền</option><option>Nguyễn Thị Vân</option></Select>
                  <Input type="date" style={{ width: 140, fontSize: 12 }} />
                  <Btn v="secondary" size="sm"><Ico d={IC.download} size={14} /> Xuất</Btn>
                </div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: T.fontB }}>
                  <thead><tr>
                    {["Thời gian", "Người thực hiện", "Hành động", "Đối tượng", "Module", "IP"].map(h => <TH key={h}>{h}</TH>)}
                  </tr></thead>
                  <tbody>
                    {auditLogs.map((log, i) => (
                      <tr key={i}>
                        <TD mono style={{ fontWeight: 600, fontSize: 12, color: T.ink, whiteSpace: "nowrap" }}>{log.time}</TD>
                        <TD style={{ fontWeight: 600, color: T.ink }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <Avatar name={log.user} size={24} />
                            {log.user}
                          </div>
                        </TD>
                        <TD style={{ fontWeight: 600 }}>{log.action}</TD>
                        <TD>{log.target}</TD>
                        <TD><Badge color={modColor(log.module)} bg={`${modColor(log.module)}15`}>{log.module}</Badge></TD>
                        <TD mono style={{ fontSize: 11, color: T.inkMuted }}>{log.ip}</TD>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", borderTop: `1px solid ${T.borderLight}`, fontSize: 12, color: T.inkMuted }}>
                <span>Hiển thị 1-10 / 248 bản ghi</span>
                <div style={{ display: "flex", gap: 4 }}>
                  {[1, 2, 3, "..."].map((p, i) => <span key={i} style={{ padding: "4px 10px", borderRadius: T.rSm, background: p === 1 ? T.primarySoft : "transparent", color: p === 1 ? T.primary : T.inkMuted, fontWeight: p === 1 ? 700 : 400, cursor: "pointer" }}>{p}</span>)}
                </div>
              </div>
            </Card>

            <Card>
              <h3 style={{ fontFamily: T.fontD, fontSize: 15, fontWeight: 700, margin: "0 0 12px" }}>Thống kê hoạt động 7 ngày gần nhất</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                {[
                  { label: "Tổng thao tác", value: "248", color: T.primary },
                  { label: "Người dùng hoạt động", value: "12", color: T.info },
                  { label: "Thay đổi cấu hình", value: "5", color: T.warning },
                  { label: "Phê duyệt", value: "34", color: T.success },
                ].map((s, i) => (
                  <div key={i} style={{ padding: 14, background: T.surfaceAlt, borderRadius: T.r, textAlign: "center" }}>
                    <div style={{ fontSize: 22, fontWeight: 800, fontFamily: T.fontD, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: T.inkMuted, marginTop: 2 }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </Card>
          </>)}
        </div>
      </div>
    </div>
  );
};

const App = function App() {
  const [page, setPage] = useState("dashboard");

  const pages = {
    dashboard: <DashboardPage onNav={setPage} />,
    leave: <LeavePage onNav={setPage} />,
    employee: <EmployeePage onNav={setPage} />,
    kpi: <KPIPage />,
    attendance: <AttendancePage />,
    training: <TrainingPage />,
    workflow: <WorkflowPage />,
    orgchart: <OrgChartPage onNav={setPage} />,
    skill: <PlaceholderPage title="Quản lý năng lực" subtitle="Ma trận năng lực, đánh giá kỹ năng theo level và lộ trình phát triển" icon="📊" breadcrumb={["Tổng quan", "Năng lực"]} items={["Skill matrix", "Self-assessment", "Manager review", "Career path", "Gap analysis"]} />,
    contract: <ContractPage />,
    payroll: <PayrollPage />,
    settings: <SettingsPage />,
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: ${T.bg}; }
        ::selection { background: ${T.primarySoft}; color: ${T.primary}; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${T.border}; border-radius: 3px; }
        input:focus, select:focus, textarea:focus { border-color: ${T.primary} !important; box-shadow: 0 0 0 3px ${T.primarySoft} !important; outline: none; }
        tr:hover td { background: ${T.surfaceHover}; }
        button:hover { filter: brightness(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>
      <div style={{ display: "flex", minHeight: "100vh", fontFamily: T.fontB }}>
        <Sidebar active={page} onNav={setPage} />
        <main key={page} style={{ flex: 1, marginLeft: 248, padding: "24px 32px 40px", maxWidth: 1200, animation: "fadeIn 0.2s ease" }}>
          {pages[page]}
        </main>
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
